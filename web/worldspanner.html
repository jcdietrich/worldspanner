  <style>
*{box-sizing:border-box;margin:0;padding:0;cursor:pointer}input,select,textarea{cursor:auto}:root{--bg-dark:#000;--bg-grey:#808080;--bg-white:#fff;--bg-blue-grey:#5a6a7a;--header-bg:#404040;--grid-line:#282828;--text-white:#fff;--text-black:#000;--btn-white:#fff;--btn-black:#000;--highlight:#ffff00}body,html{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-dark);color:var(--text-white);overflow:hidden;touch-action:manipulation}.app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto}.header{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg-blue-grey);min-height:48px;cursor:pointer;flex-shrink:0;position:relative;z-index:1}.header-clickable{display:flex;align-items:center;gap:12px;flex:1;cursor:pointer;min-height:32px}.team-icon{width:32px;height:32px;object-fit:contain}.phase-name{font-size:1.2rem;font-weight:600}.round-display{font-size:1.2rem;font-weight:600;margin-left:auto}.settings-btn{background:0 0;border:none;color:inherit;font-size:1.5rem;cursor:pointer;padding:4px}.scoreboard{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--grid-line);padding:1px;flex-shrink:0}.grid{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:repeat(4,1fr);gap:1px;background:var(--grid-line);padding:1px;min-height:0;overflow:hidden}.slot{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding:8px 4px;min-height:80px}.slot-name{font-size:.9rem;font-weight:500;text-align:center;cursor:pointer}.dropdown-arrow{font-size:.6rem;color:#999;margin-left:2px}.slot-location{font-size:.65rem;opacity:.7;text-align:center}.milestone{position:absolute;bottom:8px;right:20%;width:20px;height:20px;background:#d4af37;color:#000;font-size:.75rem;font-weight:700;border-radius:50%;display:flex;align-items:center;justify-content:center}.milestone-left{right:auto;left:20%}.slot-value{font-size:2rem;font-weight:700;margin-top:4px}.grid-5-rows .slot{padding:4px 4px;min-height:60px}.grid-5-rows .slot-name{font-size:.8rem}.grid-5-rows .slot-location{font-size:.6rem}.grid-5-rows .slot-value{font-size:1.6rem;margin-top:2px}.grid-6-rows .slot{padding:2px 4px;min-height:50px}.grid-6-rows .slot-name{font-size:.75rem}.grid-6-rows .slot-location{font-size:.55rem}.grid-6-rows .slot-value{font-size:1.4rem;margin-top:1px}.tow-buttons{position:absolute;top:0;bottom:0;left:0;right:0;display:flex;pointer-events:none}.tow-btn{flex:0 0 44px;display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:auto;border:none;opacity:.3}.tow-btn img{width:28px;height:28px;object-fit:contain}.tow-btn:hover{opacity:.5}.tow-btn:active{opacity:.6}.tow-btn-white{background:var(--btn-white);color:var(--text-black)}.tow-btn-black{background:var(--btn-black);color:var(--text-white);margin-left:auto}.slot-toggle{cursor:pointer}.slot-neutral{background:var(--bg-grey);color:var(--text-black)}.slot-black{background:var(--bg-dark);color:var(--text-white)}.slot-white{background:var(--bg-white);color:var(--text-black)}.slot-blank{background:var(--bg-grey)}.underpit-value{display:flex;align-items:center;gap:8px;font-size:2rem;font-weight:700;margin-top:4px}.underpit-icon{width:32px;height:32px}.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);align-items:center;justify-content:center;z-index:100}.modal.open{display:flex}.modal-content{background:#222;padding:20px;border-radius:8px;min-width:280px;max-width:90%}.modal-content h2{margin-bottom:16px;text-align:center}.setting-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.setting-row label{font-size:1rem}.setting-row select{padding:8px;font-size:1rem;border-radius:4px;min-width:120px}.modal-buttons{display:flex;gap:12px;margin-top:20px}.modal-buttons button{flex:1;padding:12px;font-size:1rem;border:none;border-radius:4px;cursor:pointer}#new-game-btn{background:#c00;color:#fff}#close-faction-btn,#close-settings-btn{background:#444;color:#fff}.faction-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}.faction-option{padding:12px;background:#333;border-radius:4px;cursor:pointer;text-align:center}.faction-option:hover{background:#444}.faction-option .location{font-size:.8rem;opacity:.7}.header-selected{outline:3px solid var(--highlight);outline-offset:-3px}.slot-selected{outline:3px solid var(--highlight);outline-offset:-3px}.scoreboard-cell{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg-blue-grey)}.scoreboard-cell.skyhawks{color:var(--text-white)}.scoreboard-cell.psiclones{color:var(--text-black)}.scoreboard-icon{width:32px;height:32px;object-fit:contain}.scoreboard-name{font-size:.9rem;font-weight:500}.scoreboard-score{font-size:1.5rem;font-weight:700;margin-left:auto}@media (min-width:480px){.app{margin-top:20px;border-radius:8px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.5);height:calc(100% - 40px);max-height:600px}}
